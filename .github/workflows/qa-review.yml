name: QA Review

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

jobs:
  qa-review:
    name: Claude QA Review
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'qa-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run QA Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            You are a QA engineer performing a code review on this pull request:
            ${{ github.event_name == 'workflow_dispatch' && format('https://github.com/{0}/pull/{1}', github.repository, inputs.pr_number) || github.event.pull_request.html_url }}

            Your task:
            1. Use `gh pr diff` and `gh pr view` to understand what changed in this PR
            2. Analyze the changes and identify what tests exist vs what is missing
            3. Build a traceability matrix covering: unit tests, E2E tests, edge cases, and manual scenarios
            4. Post the matrix as a PR comment using `gh pr comment` with a markdown table
            5. End with a verdict: READY / NEEDS TESTS / NEEDS MANUAL VERIFICATION

            Do NOT wait for user input. Do NOT write tests. Do NOT create branches.
            Post the comment and stop.

      - name: Remove qa-review label
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'qa-review'
              });
            } catch (e) {
              // Label may already be removed
            }
