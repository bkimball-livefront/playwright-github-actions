name: QA Review

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  qa-review:
    name: Claude QA Review
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'qa-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run QA Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the qa-agent skill in CI mode (--ci) against this PR:
            ${{ github.event.pull_request.html_url }}

            You are in CI mode. Follow the qa-agent CI workflow:
            1. Discover the stack via detect_stack.sh
            2. Analyze the PR diff and build the traceability matrix
            3. Propose unit, E2E, edge case, and manual scenarios
            4. Post the full matrix as a PR comment (markdown table + collapsed details per file)
            5. Report the verdict

            Do NOT wait for user input. Do NOT write tests. Do NOT create branches.
            Output the matrix and verdict, then stop.

      - name: Remove qa-review label
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'qa-review'
              });
            } catch (e) {
              // Label may already be removed
            }
